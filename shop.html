<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shop | Girls Zone</title>
    <style>
        body { font-family: sans-serif; background: #fff0f6; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { 
            background: white; border-radius: 20px; padding: 20px; 
            border: 2px solid #ffc1e3; text-align: center; transition: 0.3s;
        }
        .card:hover { border-color: #ff66b2; transform: translateY(-5px); }
        .price { color: #9b59b6; font-size: 1.5rem; font-weight: bold; }
        .view-btn { 
            display: inline-block; background: #ff66b2; color: white; 
            padding: 10px 20px; text-decoration: none; border-radius: 10px; margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1 style="color: #ff66b2; text-align: center;">Pick Your Favorites 💖</h1>
    
    <div class="grid">
        <div class="card">
            <h3>Royal Evening Dress</h3>
            <p class="price">$75.00</p>
            <a href="product.html?name=Royal%20Evening%20Dress&price=75&id=GZ001" class="view-btn">View Details</a>
        </div>
        <div class="card">
            <h3>Sparkle Earrings</h3>
            <p class="price">$12.00</p>
            <a href="product.html?name=Sparkle%20Earrings&price=12&id=GZ002" class="view-btn">View Details</a>
        </div>
        <div class="card">
            <h3>Matte Pink Lipstick</h3>
            <p class="price">$20.00</p>
            <a href="product.html?name=Matte%20Pink%20Lipstick&price=20&id=GZ003" class="view-btn">View Details</a>
        </div>
    </div>
</body>
</html>
